<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Tennis World</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Galerie Tennis</h1>
</header>

<main class="gallery">

    <!-- Section Photos -->
    <section class="photo-gallery">
        <h2>Photos</h2>
        <div class="gallery-container">
            <img src="instant mytique.jpg" alt="Match de tennis 1">
            <img src="instant mytique2.jpg" alt="Match de tennis 2">
            <img src="instant mytique3.jpg" alt="Célébrité tennis">
            <img src="instant mytique4.jpg" alt="Entraînement tennis">
            <img src="tennis1.jpg">
            <img src="image.jpg">
        </div>
    </section>

    <!-- section Rogger-->
     <section class="photo-gallery">
        <h2>Rogger Federer</h2>
        <div class="gallery-container">
            <img src="rogger1.jpg">
            <img src="rogger2.jpg">
            <img src="rogger3.jpg">
            <img src="rogger4.jpg">
            <img src="rogger5.jpg">
            <img src="wimbledon1.jpg">
        </div>
     </section>
     
     <!-- section Raphael Nadal-->
     <section class="photo-gallery">
        <h2>Nadal</h2>
        <div class="gallery-container">
            <img src="raph1.jpg">
            <img src="raph2.jpg">
            <img src="raph3.jpg">
            <img src="raph4.jpg">
            <img src="raph5.jpg">
            <img src="ronand2.jpg">
        </div>
        </section>


         <!-- Serena Williams-->
     <section class="photo-gallery">
        <h2>Serena</h2>
        <div class="gallery-container">
            <img src="serena1.jpg">
            <img src="serena2.jpg">
            <img src="serena3.jpg">
            <img src="serena4.jpg">
            <img src="serena5.jpg">
            <img src="us open1.jpg">
        </div>
        </section>



    <!-- Section Vidéos -->
    <section class="video-gallery">
        <h2>Vidéos</h2>
        <div class="video-container">
            <video controls>
                <source src="video1.mp4" type="video/mp4">
            </video>
            <video controls>
                <source src="video2.mp4" type="video/mp4">
            </video>
            <video controls>
                <source src="video3.mp4" type="video/mp4">
            </video>
             </video>
            <video controls>
                <source src="video5.mp4" type="video/mp4">
            </video>
            <video controls>
                <source src="video4.mp4" type="video/mp4">
            </video>
        </div>
    </section>

</main>

<footer>
    <p>© 2026 Tennis World</p>
</footer>

</body>
</html>
